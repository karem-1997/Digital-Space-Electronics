<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Space Electronics | Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --orange: #ff8c00; --blue: #0056b3; --bg: #0a0a0c; --card: #111; --wa: #25d366; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 100px; }
        
        .float-social { position: fixed; right: 20px; bottom: 30px; display: flex; flex-direction: column; gap: 12px; z-index: 9999; }
        .float-social a { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.6rem; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .wa-bg { background: var(--wa); } .fb-bg { background: #1877F2; } .ig-bg { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%); }

        header { text-align: center; padding: 40px 20px; background: #111; border-bottom: 3px solid var(--orange); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .card { background: var(--card); border-radius: 18px; border: 1px solid #222; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .card-img { width: 100%; aspect-ratio: 1/1; object-fit: contain; background: #000; }

        #adminPanel { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 10000; overflow-y: auto; padding: 25px; }
        .admin-box { background: #16161a; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .inp { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: white; border-radius: 10px; box-sizing: border-box; font-family: 'Cairo'; }
        
        .edit-row { display: flex; align-items: center; justify-content: space-between; background: #000; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-right: 4px solid var(--orange); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; overflow-y: auto; padding: 20px; }
        .modal-content { background: #111; padding: 25px; border-radius: 20px; max-width: 850px; margin: 10px auto; border: 1px solid var(--orange); }
        
        #invoiceBox { 
            background: white; color: black; padding: 40px; direction: ltr; font-family: 'Cairo', sans-serif; 
            width: 210mm; min-height: 200mm; margin: auto; box-sizing: border-box; position: relative;
        }
        
        .inv-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .inv-table th { background: #f2f2f2; text-align: left; padding: 10px; border: 1px solid #ddd; }
        .inv-table td { padding: 10px; border: 1px solid #ddd; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 8px; font-family: 'Cairo'; }
        .btn-orange { background: var(--orange); color: white; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-order { background: var(--blue); color: white; margin: 10px auto; width: 90%; }
        
        @media print {
            body * { visibility: hidden; }
            #invoiceBox, #invoiceBox * { visibility: visible; }
            #invoiceBox { position: absolute; left: 0; top: 0; width: 210mm; }
        }
    </style>
</head>
<body>

<div class="float-social">
    <a href="#" id="linkWA" class="wa-bg"><i class="fab fa-whatsapp"></i></a>
</div>

<header>
    <h1 id="shopName" style="margin:0; color:var(--orange);">Digital Space Electronics</h1>
</header>

<div id="storeGrid" class="grid"></div>

<div id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>إدارة النظام</h2>
        <button onclick="document.getElementById('adminPanel').style.display='none'" style="background:red; color:white; border:none; padding:10px; border-radius:10px;">خروج</button>
    </div>
    <div class="admin-box">
        <h3>🚨 طلبات جديدة</h3>
        <div id="listOrders"></div>
    </div>
    <div class="admin-box">
        <h3>✅ الأرشيف</h3>
        <div id="listArchive"></div>
    </div>
    <div class="admin-box">
        <h3>📦 إضافة منتج</h3>
        <input type="text" id="pN" class="inp" placeholder="اسم المنتج">
        <input type="text" id="pC" class="inp" placeholder="Item Code">
        <input type="number" id="pNew" class="inp" placeholder="السعر">
        <input type="file" id="pImg" class="inp" onchange="encodeImg()">
        <button class="btn btn-orange" onclick="handleP()">حفظ المنتج</button>
        <div id="listProds" style="margin-top:20px;"></div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div id="formSection">
            <h3 id="targetN" style="text-align:center; color:var(--orange);"></h3>
            <input type="text" id="cuN" class="inp" placeholder="اسم العميل">
            <input type="text" id="cuP" class="inp" placeholder="رقم الهاتف">
            <input type="number" id="cuQ" class="inp" placeholder="الكمية" value="1">
            <button class="btn btn-orange" onclick="submitOrder()">تأكيد وإصدار الفاتورة</button>
        </div>

        <div id="invoiceSection" style="display:none;">
            <div id="adminTaxTool" style="display:none; background:#222; padding:15px; border-radius:10px; margin-bottom:10px;">
                <label style="color:white; font-weight:bold;">
                    <input type="checkbox" id="applyTax" onchange="updateGrandTotal()"> إضافة ضريبة 5% VAT
                </label>
            </div>

            <div id="invoiceBox">
                <div style="display:flex; justify-content:space-between; border-bottom:3px solid #000; padding-bottom:10px;">
                    <div>
                        <b id="docType" style="font-size:1.2rem;">TAX INVOICE</b><br>
                        <small>Digital Space Electronics L.L.C</small><br>
                        <small>TRN: 1000177244400003</small>
                    </div>
                    <div style="text-align:right">
                        <b>DSE</b><br>
                        <small>Inv #: <span id="v_serial"></span></small><br>
                        <small id="v_date"></small>
                    </div>
                </div>
                <div style="margin:20px 0;">
                    <b>Customer:</b> <span id="v_name"></span><br>
                    <b>Phone:</b> <span id="v_phone"></span>
                </div>
                <table class="inv-table">
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th>Code</th>
                            <th>Qty</th>
                            <th>Price</th>
                            <th style="text-align:right;">Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td id="v_item"></td>
                            <td id="v_code"></td>
                            <td id="v_qty"></td>
                            <td id="v_unit"></td>
                            <td id="v_row_total" style="text-align:right;"></td>
                        </tr>
                    </tbody>
                </table>
                <div style="text-align:right; margin-top:20px;">
                    <div id="taxLine" style="display:none; margin-bottom:5px;">VAT (5%): <span id="v_tax_val"></span> AED</div>
                    <div style="font-size:1.5rem; font-weight:bold; border-top:2px solid #000; padding-top:10px;">
                        GRAND TOTAL: <span id="v_grand"></span> AED
                    </div>
                </div>
            </div>
            
            <button class="btn btn-blue" onclick="downloadInv()">حفظ كصورة 📥</button>
            <button class="btn btn-orange" style="background:#555;" onclick="window.print()">طباعة 🖨️</button>
            <button class="btn" id="waFinalBtn" style="background:var(--wa); color:white;" onclick="sendWA()">إرسال واتساب للطلب 💬</button>
        </div>
        <button class="btn" style="background:none; color:#999;" onclick="closeModal()">إغلاق</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDdqJApEM9mym9JdvwOS_Kl0mOwAt4o1qs", authDomain: "digital-space-electronics.firebaseapp.com", projectId: "digital-space-electronics", databaseURL: "https://digital-space-electronics-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let tempImg = "", activeP = null, currentOrder = null, sets = {};

    db.ref('settings').on('value', s => { sets = s.val() || { wa: "971504509223", lastSerial: 1000 }; });

    function encodeImg() { const f = document.getElementById('pImg').files[0]; const r = new FileReader(); r.onloadend = () => tempImg = r.result; r.readAsDataURL(f); }
    function handleP() {
        const d = { name: document.getElementById('pN').value, code: document.getElementById('pC').value, price: document.getElementById('pNew').value, img: tempImg };
        db.ref('items').push(d); alert("تم الإضافة");
    }

    db.ref('items').on('value', s => {
        const grid = document.getElementById('storeGrid'); grid.innerHTML = '';
        const data = s.val(); if(data) Object.keys(data).forEach(k => {
            const i = data[k];
            grid.innerHTML += `<div class="card"><img src="${i.img}" class="card-img"><div style="padding:15px;"><h4>${i.name}</h4><b style="color:var(--orange)">${i.price} AED</b></div><button class="btn btn-order" onclick="openOrder('${k}')">اطلب الآن</button></div>`;
        });
    });

    function openOrder(k) {
        db.ref('items/'+k).once('value', s => {
            activeP = s.val(); document.getElementById('targetN').innerText = activeP.name;
            document.getElementById('modal').style.display = 'block'; document.getElementById('formSection').style.display = 'block'; document.getElementById('invoiceSection').style.display = 'none';
        });
    }

    function submitOrder() {
        const q = document.getElementById('cuQ').value || 1;
        const newSerial = (sets.lastSerial || 1000) + 1;
        const order = { 
            name: activeP.name, code: activeP.code, price: activeP.price, 
            customer: document.getElementById('cuN').value, phone: document.getElementById('cuP').value, 
            qty: q, serial: newSerial, date: new Date().toLocaleString('en-GB'), status: 'new' 
        };
        db.ref('orders').push(order);
        db.ref('settings').update({ lastSerial: newSerial });
        document.getElementById('adminTaxTool').style.display = "none";
        document.getElementById('waFinalBtn').style.display = "block";
        renderInvoice(order, false);
    }

    function renderInvoice(o, isAdmin) {
        currentOrder = o;
        document.getElementById('v_serial').innerText = o.serial;
        document.getElementById('v_name').innerText = o.customer;
        document.getElementById('v_phone').innerText = o.phone;
        document.getElementById('v_date').innerText = isAdmin ? new Date().toLocaleString('en-GB') : o.date;
        document.getElementById('v_item').innerText = o.name;
        document.getElementById('v_code').innerText = o.code || 'N/A';
        document.getElementById('v_qty').innerText = o.qty;
        document.getElementById('v_unit').innerText = o.price;
        document.getElementById('v_row_total').innerText = (o.qty * o.price);
        updateGrandTotal();
        document.getElementById('formSection').style.display = 'none';
        document.getElementById('invoiceSection').style.display = 'block';
    }

    function updateGrandTotal() {
        const sub = currentOrder.qty * currentOrder.price;
        const taxActive = document.getElementById('applyTax').checked;
        if(taxActive) {
            const taxVal = sub * 0.05;
            document.getElementById('taxLine').style.display = "block";
            document.getElementById('v_tax_val').innerText = taxVal.toFixed(2);
            document.getElementById('v_grand').innerText = (sub + taxVal).toFixed(2);
        } else {
            document.getElementById('taxLine').style.display = "none";
            document.getElementById('v_grand').innerText = sub;
        }
    }

    db.ref('orders').on('value', s => {
        const list = document.getElementById('listOrders'); const arch = document.getElementById('listArchive');
        list.innerHTML = ''; arch.innerHTML = '';
        const data = s.val(); if(data) Object.keys(data).forEach(k => {
            const o = data[k];
            const html = `<div class="edit-row"><span>#${o.serial} - ${o.customer}</span><div>
                <button onclick="viewAdminInv('${k}')" style="background:blue; color:white; padding:5px; border-radius:5px; border:none;">عرض</button>
                <button onclick="db.ref('orders/${k}').update({status:'archived'})" style="background:green; color:white; padding:5px; border:none; border-radius:5px;">أرشفة</button>
                <button onclick="db.ref('orders/${k}').remove()" style="background:red; color:white; padding:5px; border:none; border-radius:5px;">حذف</button></div></div>`;
            if(o.status === 'new') list.innerHTML += html; else arch.innerHTML += html;
        });
    });

    function viewAdminInv(k) {
        db.ref('orders/'+k).once('value', s => {
            document.getElementById('adminTaxTool').style.display = "block";
            document.getElementById('waFinalBtn').style.display = "none";
            renderInvoice(s.val(), true);
            document.getElementById('modal').style.display='block';
        });
    }

    function downloadInv() { html2canvas(document.querySelector("#invoiceBox"), {scale:3}).then(c => { const l = document.createElement('a'); l.download=`Invoice-${currentOrder.serial}.png`; l.href=c.toDataURL(); l.click(); }); }
    function sendWA() { window.open(`https://wa.me/${sets.wa}?text=طلب جديد رقم ${currentOrder.serial}: ${currentOrder.name} - الكمية: ${currentOrder.qty}`, '_blank'); }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function checkAdmin() { if(prompt("Pass:")==="123") document.getElementById('adminPanel').style.display='block'; }
</script>

<footer style="text-align:center; padding:40px; opacity:0.1;"><button onclick="checkAdmin()" style="background:none; border:none; color:white;">[ ADMIN ]</button></footer>

</body>
</html>
