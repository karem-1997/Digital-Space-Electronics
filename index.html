<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Space Electronics | Dubai</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --blue: #0056b3; --orange: #ff8c00; --gold: #ffb703; --wa: #25d366; --bg: #0a0a0c; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; }
        
        /* التواصل أسفل اليمين */
        .side-social { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .side-social a { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .wa-side { background: var(--wa); } .fb-side { background: #1877F2; } .ig-side { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%); }

        header { padding: 40px 20px; text-align: center; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?q=80&w=1470'); background-size: cover; border-bottom: 2px solid #222; }
        header h1 span { color: var(--orange); }

        .search-area { padding: 0 5%; margin-top: -25px; }
        .search-box { background: #111; border: 2px solid var(--orange); border-radius: 30px; display: flex; align-items: center; padding: 5px 20px; }
        .search-box input { background: transparent; border: none; color: white; padding: 10px; width: 100%; outline: none; font-family: 'Cairo'; }
        
        .categories { display: flex; justify-content: center; gap: 8px; margin: 20px 0; overflow-x: auto; padding-bottom: 10px; }
        .cat-btn { background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 8px 18px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.85rem; }
        .cat-btn.active { background: var(--orange); color: white; border-color: var(--orange); }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 5%; }
        .card { background: #111; border-radius: 12px; border: 1px solid #222; overflow: hidden; position: relative; }
        .img-box img { width: 100%; aspect-ratio: 1/1; object-fit: contain; background: #000; cursor: pointer; }
        .card-info { padding: 10px; text-align: center; }

        /* لوحة التحكم المطورة */
        #adminDashboard { display: none; background: #0d0d0f; border: 2px solid var(--blue); padding: 20px; border-radius: 20px; margin: 20px; }
        .admin-sec { background: #16161a; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .admin-sec input, .admin-sec select { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .order-item { background: #000; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-right: 4px solid var(--orange); }

        /* المودال */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); overflow-y: auto; }
        .modal-content { background: #0a0a0c; margin: 40px auto; padding: 20px; border: 1px solid var(--blue); width: 85%; max-width: 360px; border-radius: 20px; position: relative; }
        
        .small-form input, .small-form textarea { width: 100%; display: block; margin: 10px auto; padding: 10px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; text-align: center; box-sizing: border-box; font-family: 'Cairo'; }

        #invoiceBox { background: white; color: black; padding: 20px; font-family: 'Cairo'; border-top: 12px solid #000; text-align: left; direction: ltr; }
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 8px; font-family: 'Cairo'; }
        .btn-wa { background: var(--wa); color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
<body>

<div class="side-social">
    <a href="https://wa.me/971504509223" target="_blank" class="wa-side"><i class="fab fa-whatsapp"></i></a>
    <a href="#" class="fb-side"><i class="fab fa-facebook-f"></i></a>
    <a href="#" class="ig-side"><i class="fab fa-instagram"></i></a>
</div>

<header>
    <h1 id="dTitle">Digital Space <span>Electronics</span></h1>
    <p id="dSlogan" style="color:var(--gold); font-size:0.75rem;">LAPTOPS • SPARE PARTS • ACCESSORIES</p>
</header>

<div class="search-area">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="mainSearch" placeholder="ابحث بالاسم أو الكود..." onkeyup="filterItems()">
    </div>
    <div class="categories">
        <button class="cat-btn active" onclick="filterCat('الجميع', this)">الجميع</button>
        <button class="cat-btn" onclick="filterCat('أجهزة', this)">أجهزة</button>
        <button class="cat-btn" onclick="filterCat('قطع غيار', this)">قطع غيار</button>
        <button class="cat-btn" onclick="filterCat('إكسسوارات', this)">إكسسوارات</button>
    </div>
</div>

<div class="container">
    <div id="adminDashboard">
        <h3>DSE Control Panel</h3>
        <div class="admin-sec">
            <h4>إضافة منتج</h4>
            <input type="text" id="pN" placeholder="اسم المنتج">
            <select id="pCat"><option value="أجهزة">أجهزة</option><option value="قطع غيار">قطع غيار</option><option value="إكسسوارات">إكسسوارات</option></select>
            <input type="text" id="pC" placeholder="Item Code (PN)">
            <input type="number" id="pPrice" placeholder="السعر">
            <input type="file" id="pI" onchange="readImg()">
            <button class="btn" style="background:var(--orange); color:white" onclick="addP()">نشر</button>
        </div>

        <div class="admin-sec">
            <h4>📦 الطلبات الجديدة</h4>
            <div id="listNewOrders"></div>
        </div>

        <div class="admin-sec">
            <h4>✅ الأرشيف (تم البيع)</h4>
            <div id="listArchive"></div>
        </div>

        <div id="manageItems" class="admin-sec"><h4>🛠️ إدارة المنتجات</h4></div>
        <button class="btn" style="background:#333; color:white" onclick="closeAdm()">إغلاق</button>
    </div>
    <div id="menuGrid" class="menu-grid"></div>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal()" style="position:absolute; right:15px; top:10px; font-size:25px; color:white; cursor:pointer;">&times;</span>
        <div id="formView" class="small-form">
            <h4 id="popName" style="color:var(--orange); text-align:center; margin-top:20px;"></h4>
            <input type="text" id="custN" placeholder="اسمك">
            <input type="text" id="custP" placeholder="موبايلك">
            <textarea id="custA" placeholder="عنوان التوصيل"></textarea>
            <button class="btn" style="background:var(--blue); color:white" onclick="confirmOrder()">تقديم الطلب</button>
        </div>

        <div id="invoiceView" style="display:none;">
            <div id="invoiceBox">
                <h3 style="margin:0">DSE Invoice</h3>
                <small>Shop 7, Bur-Dubai | TRN: 1000177244400003</small>
                <hr>
                <b>To:</b> <span id="vCN"></span><br>
                <b>Item:</b> <span id="vIT"></span><br>
                <b>Total:</b> <span id="vTOT"></span> AED
            </div>
            <p style="color:var(--orange); font-size:0.7rem; text-align:center; margin:10px 0;">📸 احفظ الصورة وأرسلها واتساب لتأكيد طلبك.</p>
            <button class="btn" style="background:#222; color:white" onclick="downloadInv()">حفظ صورة 📥</button>
            <button class="btn btn-wa" onclick="sendToWa()"><i class="fab fa-whatsapp"></i> واتساب</button>
        </div>
    </div>
</div>

<footer style="text-align:center; padding:40px;"><button onclick="openAdm()" style="background:none; border:none; color:#111; cursor:pointer;">DSE LOGIN</button></footer>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDdqJApEM9mym9JdvwOS_Kl0mOwAt4o1qs", authDomain: "digital-space-electronics.firebaseapp.com", projectId: "digital-space-electronics", databaseURL: "https://digital-space-electronics-default-rtdb.firebaseio.com", storageBucket: "digital-space-electronics.firebasestorage.app", messagingSenderId: "131126382715", appId: "1:131126382715:web:38118e9b02952e655c92de" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let tempImg = "", allItems = [], activeItem = null;

    function openAdm() { const p = prompt("Password:"); if(p==="123") { document.getElementById('adminDashboard').style.display='block'; syncAdmin(); } }
    function closeAdm() { document.getElementById('adminDashboard').style.display='none'; }
    function readImg() { const f = new FileReader(); f.onloadend = () => tempImg = f.result; f.readAsDataURL(document.getElementById('pI').files[0]); }

    function addP() {
        const data = { name: document.getElementById('pN').value, cat: document.getElementById('pCat').value, code: document.getElementById('pC').value, price: document.getElementById('pPrice').value, img: tempImg };
        db.ref('items').push(data).then(() => location.reload());
    }

    function syncAdmin() {
        // إدارة المنتجات
        db.ref('items').on('value', s => {
            const its = s.val(); const div = document.getElementById('manageItems'); div.innerHTML = '<h4>إدارة المنتجات:</h4>';
            if(its) Object.keys(its).forEach(id => {
                div.innerHTML += `<div style="display:flex; align-items:center; gap:10px; background:#000; padding:8px; margin-bottom:5px;">
                    <img src="${its[id].img}" width="30">
                    <span style="font-size:0.7rem; flex:1;">${its[id].name} - ${its[id].price} AED</span>
                    <button style="color:red;" onclick="db.ref('items/${id}').remove()">حذف</button>
                </div>`;
            });
        });

        // إدارة الطلبات والأرشيف
        db.ref('orders').on('value', s => {
            const os = s.val(); const nD = document.getElementById('listNewOrders'); const aD = document.getElementById('listArchive');
            nD.innerHTML = ''; aD.innerHTML = '';
            if(os) Object.keys(os).forEach(id => {
                const o = os[id];
                const html = `<div class="order-item">
                    <b>${o.customer}</b><br><small>${o.n} | ${o.p} AED</small><br>
                    <button style="background:green; color:white; border:none; padding:4px 8px; border-radius:4px;" onclick="updateStatus('${id}', 'sold')">تم البيع ✅</button>
                    <button style="background:red; color:white; border:none; padding:4px 8px; border-radius:4px;" onclick="db.ref('orders/${id}').remove()">حذف 🗑️</button>
                </div>`;
                o.status === 'sold' ? aD.innerHTML += html : nD.innerHTML += html;
            });
        });
    }

    function updateStatus(id, stat) { db.ref('orders/'+id).update({ status: stat }); }

    function filterCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
        const grid = document.getElementById('menuGrid'); grid.innerHTML = '';
        allItems.forEach(i => { if(cat === 'الجميع' || i.cat === cat) renderItem(i); });
    }

    function filterItems() {
        const v = document.getElementById('mainSearch').value.toLowerCase();
        const grid = document.getElementById('menuGrid'); grid.innerHTML = '';
        allItems.forEach(i => { if(i.name.toLowerCase().includes(v) || i.code.toLowerCase().includes(v)) renderItem(i); });
    }

    function renderItem(i) {
        document.getElementById('menuGrid').innerHTML += `<div class="card">
            <div class="img-box" onclick="openBuy('${i.name}','${i.code}','${i.price}')"><img src="${i.img}"></div>
            <div class="card-info">
                <small style="font-size:0.6rem;">PN: ${i.code}</small>
                <h4 style="margin:5px 0; font-size:0.8rem; height:35px; overflow:hidden;">${i.name}</h4>
                <div style="color:var(--gold); font-weight:bold;">${i.price} AED</div>
                <button class="btn" style="background:var(--blue); color:white; padding:6px; font-size:0.7rem;" onclick="openBuy('${i.name}','${i.code}','${i.price}')">طلب شراء</button>
            </div>
        </div>`;
    }

    function openBuy(n, c, p) { 
        activeItem = {n, c, p}; 
        document.getElementById('popName').innerText = n;
        document.getElementById('formView').style.display='block';
        document.getElementById('invoiceView').style.display='none';
        document.getElementById('orderModal').style.display='block';
    }

    function confirmOrder() {
        const n = document.getElementById('custN').value, p = document.getElementById('custP').value, a = document.getElementById('custA').value;
        if(!n || !p) return alert("يرجى كتابة الاسم والموبايل");
        document.getElementById('vCN').innerText = n;
        document.getElementById('vIT').innerText = activeItem.n;
        document.getElementById('vTOT').innerText = activeItem.p;
        document.getElementById('formView').style.display='none';
        document.getElementById('invoiceView').style.display='block';
        db.ref('orders').push({ ...activeItem, customer: n, phone: p, addr: a, status: 'new' });
    }

    function downloadInv() { html2canvas(document.querySelector("#invoiceBox")).then(canvas => { const l = document.createElement('a'); l.download = `Invoice.png`; l.href = canvas.toDataURL(); l.click(); }); }
    function sendToWa() { window.open(`https://wa.me/971504509223?text=طلب جديد: ${activeItem.n}`, '_blank'); }
    function closeModal() { document.getElementById('orderModal').style.display = 'none'; }

    db.ref('items').on('value', s => { 
        allItems = []; document.getElementById('menuGrid').innerHTML = ''; 
        const v = s.val(); if(v) Object.keys(v).forEach(id => { allItems.push(v[id]); renderItem(v[id]); }); 
    });
</script>
</body>
</html>
