<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Space Electronics | Dubai</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --blue: #0056b3; --orange: #ff8c00; --gold: #ffb703; --wa: #25d366; --bg: #0a0a0c; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; }
        
        /* أيقونات السوشيال ميديا العائمة (الدوائر) */
        .floating-social { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 9999; }
        .social-circle { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.3s; text-decoration: none; }
        .social-circle:hover { transform: scale(1.1); }
        .wa-bg { background: var(--wa); }
        .fb-bg { background: #1877F2; }
        .ig-bg { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%); }

        header { padding: 40px 20px; text-align: center; background: #111; border-bottom: 3px solid var(--orange); }
        .search-area { padding: 0 5%; margin-top: -25px; }
        .search-box { background: #111; border: 2px solid var(--orange); border-radius: 30px; display: flex; align-items: center; padding: 5px 20px; }
        .search-box input { background: transparent; border: none; color: white; padding: 10px; width: 100%; outline: none; font-family: 'Cairo'; text-align: center; }
        
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px 5%; }
        .card { background: #111; border-radius: 15px; border: 1px solid #222; overflow: hidden; text-align: center; padding-bottom: 10px; }
        
        /* لوحة التحكم */
        #adminDashboard { display: none; position: fixed; inset: 0; background: #0a0a0c; z-index: 10000; overflow-y: auto; padding: 20px; }
        .admin-sec { background: #16161a; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .adm-input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; font-family: 'Cairo'; }
        
        .order-row { background: #000; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-right: 4px solid var(--orange); display: flex; justify-content: space-between; align-items: center; }
        
        /* الفاتورة */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 99999; overflow-y: auto; }
        .modal-content { background: #000; margin: 20px auto; padding: 20px; width: 90%; max-width: 450px; border-radius: 20px; border: 1px solid var(--blue); }
        #invoiceBox { background: white; color: black; padding: 25px; direction: ltr; text-align: left; }

        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; font-family: 'Cairo'; margin-top: 5px; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-orange { background: var(--orange); color: white; }
    </style>
</head>
<body>

<div class="floating-social">
    <a href="#" id="floatWA" class="social-circle wa-bg" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <a href="#" id="floatFB" class="social-circle fb-bg" target="_blank"><i class="fab fa-facebook-f"></i></a>
    <a href="#" id="floatIG" class="social-circle ig-bg" target="_blank"><i class="fab fa-instagram"></i></a>
</div>

<header>
    <h1 id="displayTitle" style="color:var(--orange); margin:0;">Digital Space Electronics</h1>
    <p style="color:#888;">LAPTOPS • SPARE PARTS • ACCESSORIES</p>
</header>

<div class="search-area">
    <div class="search-box">
        <input type="text" id="mainSearch" placeholder="بحث عن منتج..." onkeyup="filterItems()">
    </div>
</div>

<div id="menuGrid" class="menu-grid"></div>

<div id="adminDashboard">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:var(--orange)">لوحة التحكم</h2>
        <button onclick="document.getElementById('adminDashboard').style.display='none'" style="background:red; color:white; border:none; padding:10px; border-radius:5px;">خروج</button>
    </div>

    <div class="admin-sec">
        <h3>🔗 إعدادات الموقع والروابط</h3>
        <input type="text" id="inShopTitle" class="adm-input" placeholder="اسم الموقع الجديد">
        <input type="text" id="inWA" class="adm-input" placeholder="رقم الواتساب (مثال: 971500000000)">
        <input type="text" id="inFB" class="adm-input" placeholder="رابط الفيسبوك">
        <input type="text" id="inIG" class="adm-input" placeholder="رابط الانستجرام">
        <button class="btn btn-blue" onclick="saveSettings()">حفظ الإعدادات</button>
    </div>

    <div class="admin-sec">
        <h3 id="formActionTitle">➕ إضافة منتج</h3>
        <input type="hidden" id="editKey">
        <input type="text" id="pN" class="adm-input" placeholder="اسم المنتج">
        <input type="text" id="pC" class="adm-input" placeholder="PN Code">
        <input type="number" id="pPrice" class="adm-input" placeholder="السعر">
        <input type="file" id="pI" class="adm-input" onchange="encodeImg()">
        <button id="saveBtn" class="btn btn-orange" onclick="handleProduct()">نشر المنتج</button>
    </div>

    <div class="admin-sec">
        <h3>📦 المخزون</h3>
        <div id="adminInv"></div>
    </div>
</div>

<div id="mainModal" class="modal">
    <div class="modal-content">
        <div id="orderForm">
            <h3 id="targetN" style="text-align:center; color:var(--orange)"></h3>
            <input type="text" id="cN" class="adm-input" placeholder="الاسم">
            <input type="text" id="cP" class="adm-input" placeholder="الهاتف">
            <textarea id="cA" class="adm-input" placeholder="العنوان"></textarea>
            <button class="btn btn-blue" onclick="confirmOrder()">تأكيد الطلب</button>
        </div>
        <div id="invoiceView" style="display:none;">
            <div id="invoiceBox">
                <h3>TAX INVOICE</h3>
                <hr>
                <b>Customer:</b> <span id="vN"></span><br>
                <b>Item:</b> <span id="vI"></span><br>
                <b>Total:</b> <span id="vT"></span> AED
            </div>
            <button class="btn btn-orange" onclick="downloadInv()">حفظ الفاتورة</button>
        </div>
        <button class="btn" style="background:#333; color:white;" onclick="document.getElementById('mainModal').style.display='none'">إغلاق</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDdqJApEM9mym9JdvwOS_Kl0mOwAt4o1qs", authDomain: "digital-space-electronics.firebaseapp.com", projectId: "digital-space-electronics", databaseURL: "https://digital-space-electronics-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let tempImg = "", currentSettings = {};

    // مزامنة الإعدادات (اسم الموقع والروابط)
    db.ref('settings').on('value', s => {
        const val = s.val() || { title: "Digital Space Electronics", wa: "971504509223", fb: "#", ig: "#" };
        currentSettings = val;
        document.getElementById('displayTitle').innerText = val.title;
        document.getElementById('floatWA').href = `https://wa.me/${val.wa}`;
        document.getElementById('floatFB').href = val.fb;
        document.getElementById('floatIG').href = val.ig;
    });

    function saveSettings() {
        const data = {
            title: document.getElementById('inShopTitle').value || currentSettings.title,
            wa: document.getElementById('inWA').value || currentSettings.wa,
            fb: document.getElementById('inFB').value || currentSettings.fb,
            ig: document.getElementById('inIG').value || currentSettings.ig
        };
        db.ref('settings').set(data).then(() => alert("تم تحديث الإعدادات بنجاح!"));
    }

    function encodeImg() { const f = document.getElementById('pI').files[0]; const r = new FileReader(); r.onloadend = () => tempImg = r.result; r.readAsDataURL(f); }

    function handleProduct() {
        const key = document.getElementById('editKey').value;
        const d = { name: document.getElementById('pN').value, code: document.getElementById('pC').value, price: document.getElementById('pPrice').value };
        if(tempImg) d.img = tempImg;

        if(key) db.ref('items/'+key).update(d); else db.ref('items').push(d);
        resetForm();
    }

    function editItem(key) {
        db.ref('items/'+key).once('value', s => {
            const i = s.val();
            document.getElementById('editKey').value = key;
            document.getElementById('pN').value = i.name;
            document.getElementById('pC').value = i.code;
            document.getElementById('pPrice').value = i.price;
            document.getElementById('formActionTitle').innerText = "📝 تعديل المنتج";
            document.getElementById('saveBtn').innerText = "تحديث الآن";
            window.scrollTo(0,0);
        });
    }

    function resetForm() {
        document.getElementById('editKey').value = "";
        document.getElementById('pN').value = "";
        document.getElementById('pC').value = "";
        document.getElementById('pPrice').value = "";
        tempImg = "";
        document.getElementById('formActionTitle').innerText = "➕ إضافة منتج";
        document.getElementById('saveBtn').innerText = "نشر المنتج";
    }

    db.ref('items').on('value', s => {
        const grid = document.getElementById('menuGrid'); const inv = document.getElementById('adminInv');
        grid.innerHTML = ''; inv.innerHTML = '';
        const data = s.val(); if(data) Object.keys(data).forEach(k => {
            const i = data[k];
            grid.innerHTML += `<div class="card" onclick="openOrder('${k}')">
                <img src="${i.img}" style="width:100%; aspect-ratio:1/1; object-fit:contain; background:#000;">
                <h4>${i.name}</h4><div style="color:var(--orange)">${i.price} AED</div>
            </div>`;
            inv.innerHTML += `<div class="order-row"><span>${i.name}</span><div>
                <button onclick="editItem('${k}')" style="background:orange; color:white; border:none; padding:5px; border-radius:5px;">تعديل</button>
                <button onclick="db.ref('items/${k}').remove()" style="background:red; color:white; border:none; padding:5px; border-radius:5px;">حذف</button>
            </div></div>`;
        });
    });

    let activeP = null;
    function openOrder(k) {
        db.ref('items/'+k).once('value', s => {
            activeP = s.val();
            document.getElementById('targetN').innerText = activeP.name;
            document.getElementById('mainModal').style.display='block';
            document.getElementById('orderForm').style.display='block';
            document.getElementById('invoiceView').style.display='none';
        });
    }

    function confirmOrder() {
        const o = { ...activeP, customer: document.getElementById('cN').value, phone: document.getElementById('cP').value, date: new Date().toLocaleString() };
        db.ref('orders').push(o).then(() => {
            document.getElementById('vN').innerText = o.customer;
            document.getElementById('vI').innerText = o.name;
            document.getElementById('vT').innerText = o.price;
            document.getElementById('orderForm').style.display='none';
            document.getElementById('invoiceView').style.display='block';
        });
    }

    function downloadInv() { html2canvas(document.querySelector("#invoiceBox")).then(c => { const l = document.createElement('a'); l.download='Invoice.png'; l.href=c.toDataURL(); l.click(); }); }
    function filterItems() { /* وظيفة البحث المبسطة */ }
    function checkAdmin() { if(prompt("Pass:")==="123") document.getElementById('adminDashboard').style.display='block'; }
</script>

<footer style="text-align:center; padding:40px; opacity:0.2;">
    <button onclick="checkAdmin()" style="background:none; border:none; color:white;">[ ADMIN ]</button>
</footer>
</body>
</html>
