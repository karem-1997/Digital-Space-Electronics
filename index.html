<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Space Electronics | Dubai</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Cairo:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { 
            --tech-blue: #0056b3; --tech-orange: #ff8c00; --gold: #ffb703; 
            --whatsapp: #25d366; --dark-bg: #0a0a0c; --glass: rgba(255, 255, 255, 0.05);
        }
        
        body { 
            font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: white; margin: 0; 
            padding-bottom: 50px; background-size: cover; background-attachment: fixed; transition: 0.5s;
        }

        header { 
            height: 25vh; margin: 10px; border-radius: 15px;
            background: linear-gradient(45deg, rgba(0,0,0,0.8), rgba(0,86,179,0.4)), url('https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?q=80&w=1470'); 
            background-size: cover; background-position: center; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .logo { font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: 700; margin: 0; }
        .logo span { color: var(--tech-orange); }
        .slogan { color: var(--gold); font-size: 0.9rem; margin-top: 5px; letter-spacing: 1px; }

        /* شريط البحث */
        .search-area { padding: 0 5%; margin: -20px 0 20px 0; display: flex; flex-direction: column; align-items: center; gap: 12px; position: sticky; top: 10px; z-index: 1000; }
        .search-box { 
            position: relative; width: 100%; max-width: 350px; 
            background: rgba(15, 15, 20, 0.95); border-radius: 25px; border: 1px solid var(--tech-blue);
            backdrop-filter: blur(10px);
        }
        .search-box input { width: 100%; padding: 10px 40px 10px 20px; border: none; background: transparent; color: white; outline: none; box-sizing: border-box; }
        .search-box i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--tech-orange); }

        .filter-bar { display: flex; gap: 8px; overflow-x: auto; width: 100%; max-width: 500px; padding: 5px; scrollbar-width: none; justify-content: center; }
        .tag { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .tag.active { background: var(--tech-orange); border-color: var(--tech-orange); }

        .container { padding: 0 4%; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 768px) { .menu-grid { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); } }

        /* كرت المنتج */
        .card { background: var(--glass); border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-5px); border-color: var(--tech-blue); }
        .img-box { width: 100%; aspect-ratio: 1/1; position: relative; background: #000; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }
        .discount-badge { position: absolute; top: 10px; right: 10px; background: #ff4d6d; color: white; padding: 3px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
        
        .card-info { padding: 12px; }
        .card-info h3 { margin: 0 0 5px 0; font-size: 0.9rem; height: 1.3em; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .card-info p { font-size: 0.75rem; color: #888; margin: 0 0 8px 0; height: 1.2em; overflow: hidden; }
        .new-price { color: var(--gold); font-size: 1.1rem; font-weight: 700; }

        /* النافذة الحوارية (Modal) */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .modal-content { 
            position: relative; background: #0f0f12; margin: 5% auto; padding: 20px; border: 1px solid var(--tech-blue); 
            width: 90%; max-width: 500px; border-radius: 20px; text-align: center; max-height: 85vh; overflow-y: auto;
        }
        .close-modal { position: absolute; top: 15px; right: 20px; color: white; font-size: 30px; cursor: pointer; }
        .modal-img { width: 100%; max-height: 300px; object-fit: contain; background: #000; border-radius: 10px; margin-bottom: 15px; }
        .modal-details h2 { color: var(--tech-orange); margin: 10px 0; }
        .modal-details p { color: #ccc; line-height: 1.6; margin-bottom: 20px; white-space: pre-wrap; }
        .modal-price { font-size: 1.5rem; color: var(--gold); font-weight: bold; margin-bottom: 20px; display: block; }
        
        /* لوحة التحكم */
        #adminDashboard { display: none; direction: rtl; background: #0a0a0c; border: 2px solid var(--tech-blue); padding: 25px; border-radius: 20px; margin-bottom: 30px; font-family: 'Cairo'; }
        .admin-sec { background: #151518; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #222; }
        .admin-sec input, .admin-sec select, .admin-sec textarea { background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }

        footer { text-align: center; padding: 40px 20px; color: #333; font-size: 0.8rem; }
        .dse-btn { background: transparent; border: none; color: #111; cursor: pointer; font-size: 12px; margin-top: 20px; letter-spacing: 2px; }
    </style>
</head>
<body>

<header id="siteHeader">
    <h1 class="logo">Digital Space <span>Electronics</span></h1>
    <p class="slogan">LAPTOPS • SPARE PARTS • ACCESSORIES</p>
</header>

<div class="search-area">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search products..." onkeyup="runFilter()">
    </div>
    <div class="filter-bar">
        <div class="tag active" onclick="setCategory('All', this)">All</div>
        <div class="tag" onclick="setCategory('Laptops', this)">Laptops</div>
        <div class="tag" onclick="setCategory('Spare Parts', this)">Spare Parts</div>
        <div class="tag" onclick="setCategory('Accessories', this)">Accessories</div>
    </div>
</div>

<div class="container">
    <div id="adminDashboard">
        <h2 style="text-align:center;">DSE Control Panel</h2>
        <div class="admin-sec">
            <h4>Settings & Appearance</h4>
            <input type="password" id="newPass" placeholder="New Admin Password">
            <input type="text" id="newWA" placeholder="WhatsApp (97150...)">
            <label>Site Cover:</label><input type="file" id="headerFile" accept="image/*" onchange="previewHeader()">
            <label>General BG:</label><input type="file" id="bodyFile" accept="image/*" onchange="previewBody()">
            <button class="btn" style="background:var(--tech-blue); color:white;" onclick="updateSettings()">Save All Changes</button>
        </div>

        <div class="admin-sec">
            <h4>Add Product</h4>
            <button class="btn" style="background:#222; color:white; margin-bottom:10px;" onclick="document.getElementById('imgUpload').click()">Upload Photo</button>
            <input type="file" id="imgUpload" accept="image/*" style="display:none" onchange="previewImg()">
            <input type="text" id="pName" placeholder="Product Title">
            <textarea id="pSpec" rows="3" placeholder="Full Description (will show in pop-up)"></textarea>
            <select id="pCat">
                <option value="Laptops">Laptops</option>
                <option value="Spare Parts">Spare Parts</option>
                <option value="Accessories">Accessories</option>
            </select>
            <input type="number" id="pPrice" placeholder="Price (AED)">
            <input type="number" id="pDisc" placeholder="Discount %">
            <button class="btn" style="background:var(--tech-orange); color:white;" onclick="addProduct()">Publish</button>
        </div>
        <button class="btn" style="background:#444; color:white;" onclick="exitAdmin()">Close</button>
    </div>

    <div id="menuGrid" class="menu-grid"></div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <img id="modalImg" class="modal-img" src="">
        <div class="modal-details">
            <h2 id="modalTitle"></h2>
            <span id="modalPrice" class="modal-price"></span>
            <p id="modalDesc"></p>
            <a href="#" id="modalWALink" class="btn" style="background:var(--whatsapp); color:white; text-decoration:none; display:block;">ORDER NOW</a>
        </div>
    </div>
</div>

<footer>
    <p>Digital Space Electronics L.L.C | Dubai, UAE<br>TRN: 1000177244400003</p>
    <button class="dse-btn" onclick="enterAdmin()">DSE</button>
</footer>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDdqJApEM9mym9JdvwOS_Kl0mOwAt4o1qs",
        authDomain: "digital-space-electronics.firebaseapp.com",
        projectId: "digital-space-electronics",
        databaseURL: "https://digital-space-electronics-default-rtdb.firebaseio.com",
        storageBucket: "digital-space-electronics.firebasestorage.app",
        messagingSenderId: "131126382715",
        appId: "1:131126382715:web:38118e9b02952e655c92de"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let currentImg = "", hImg = "", bImg = "", currentCat = "All", isAuthorized = false, globalWA = "971504509223";

    function enterAdmin() {
        const pass = prompt("DSE Admin:");
        database.ref('adminPass').once('value', (snap) => {
            if(pass === (snap.val() || "123")) { isAuthorized = true; document.getElementById('adminDashboard').style.display = 'block'; window.scrollTo(0,0); renderMenu(); }
        });
    }
    function exitAdmin() { isAuthorized = false; document.getElementById('adminDashboard').style.display = 'none'; renderMenu(); }

    function previewImg() { const r = new FileReader(); r.onloadend = () => currentImg = r.result; r.readAsDataURL(document.getElementById('imgUpload').files[0]); }
    function previewHeader() { const r = new FileReader(); r.onloadend = () => hImg = r.result; r.readAsDataURL(document.getElementById('headerFile').files[0]); }
    function previewBody() { const r = new FileReader(); r.onloadend = () => bImg = r.result; r.readAsDataURL(document.getElementById('bodyFile').files[0]); }

    function updateSettings() {
        const up = {};
        const p = document.getElementById('newPass').value;
        const wa = document.getElementById('newWA').value;
        if(p) database.ref('adminPass').set(p);
        if(wa) up.wa = wa;
        if(hImg) up.hImg = hImg;
        if(bImg) up.bImg = bImg;
        database.ref('settings').update(up).then(() => { alert("Updated!"); location.reload(); });
    }

    function addProduct() {
        const name = document.getElementById('pName').value;
        const spec = document.getElementById('pSpec').value;
        const price = document.getElementById('pPrice').value;
        const disc = document.getElementById('pDisc').value || 0;
        const cat = document.getElementById('pCat').value;
        if(currentImg && name && price) {
            database.ref('items').push({ name, spec, price, disc, cat, img: currentImg }).then(() => { alert("Done!"); location.reload(); });
        }
    }

    function showDetails(name, spec, price, disc, img) {
        const finalP = disc > 0 ? Math.round(price * (1 - disc/100)) : price;
        document.getElementById('modalTitle').innerText = name;
        document.getElementById('modalDesc').innerText = spec;
        document.getElementById('modalPrice').innerText = finalP + " AED";
        document.getElementById('modalImg').src = img;
        document.getElementById('modalWALink').href = `https://wa.me/${globalWA}?text=Order: ${name}`;
        document.getElementById('productModal').style.display = "block";
    }

    function closeModal() { document.getElementById('productModal').style.display = "none"; }

    function deleteItem(id, e) { e.stopPropagation(); if(confirm("Delete?")) database.ref('items/' + id).remove().then(() => renderMenu()); }

    function setCategory(cat, el) {
        document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        currentCat = cat; runFilter();
    }

    function runFilter() { renderMenu(document.getElementById('searchInput').value.toLowerCase(), currentCat); }

    function renderMenu(search = "", cat = "All") {
        database.ref('items').once('value', (snap) => {
            const items = snap.val();
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = '';
            if(!items) return;
            Object.keys(items).forEach(id => {
                const item = items[id];
                if((item.name.toLowerCase().includes(search) || item.spec.toLowerCase().includes(search)) && (cat === "All" || item.cat === cat)) {
                    const d = parseInt(item.disc || 0);
                    const fp = d > 0 ? Math.round(item.price * (1 - d/100)) : item.price;
                    grid.innerHTML += `
                        <div class="card" onclick="showDetails('${item.name}', \`${item.spec}\`, ${item.price}, ${d}, '${item.img}')">
                            <div class="img-box">
                                ${d > 0 ? `<div class="discount-badge">-${d}% OFF</div>` : ''}
                                <img src="${item.img}">
                            </div>
                            <div class="card-info">
                                <h3>${item.name}</h3>
                                <p>${item.spec.substring(0, 30)}...</p>
                                <span class="new-price">${fp} AED</span>
                                ${isAuthorized ? `<button onclick="deleteItem('${id}', event)" style="background:red; color:white; border:none; width:100%; margin-top:8px; padding:5px; border-radius:5px;">Delete</button>` : ''}
                            </div>
                        </div>`;
                }
            });
        });
    }

    database.ref('settings').on('value', (snap) => {
        const s = snap.val();
        if(s) {
            globalWA = s.wa || globalWA;
            if(s.hImg) document.getElementById('siteHeader').style.backgroundImage = `linear-gradient(45deg, rgba(0,0,0,0.8), rgba(0,86,179,0.4)), url(${s.hImg})`;
            if(s.bImg) document.body.style.backgroundImage = `url(${s.bImg})`;
        }
    });

    renderMenu();
    window.onclick = function(event) { if (event.target == document.getElementById('productModal')) closeModal(); }
</script>
</body>
</html>
