<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Space Electronics | Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --orange: #ff8c00; --blue: #0056b3; --bg: #0a0a0c; --card: #111; --wa: #25d366; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); background-size: cover; background-attachment: fixed; background-position: center; color: white; margin: 0; padding-bottom: 100px; }
        
        .float-social { position: fixed; right: 20px; bottom: 30px; display: flex; flex-direction: column; gap: 12px; z-index: 9999; }
        .float-social a { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.6rem; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .wa-bg { background: var(--wa); } .fb-bg { background: #1877F2; } .ig-bg { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%); }

        header { text-align: center; padding: 60px 20px; background: #111; background-size: cover; background-position: center; border-bottom: 3px solid var(--orange); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .card { background: var(--card); border-radius: 18px; border: 1px solid #222; overflow: hidden; position: relative; }
        .card-img { width: 100%; aspect-ratio: 1/1; object-fit: contain; background: #000; }
        .discount-tag { position: absolute; top: 10px; right: 10px; background: red; color: white; padding: 2px 8px; border-radius: 8px; font-size: 0.75rem; font-weight: bold; }

        #adminPanel { display: none; position: fixed; inset: 0; background: #0a0a0c; z-index: 10000; overflow-y: auto; padding: 25px; }
        .admin-box { background: #16161a; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .inp { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: white; border-radius: 10px; font-family: 'Cairo'; }
        
        .edit-row { display: flex; align-items: center; justify-content: space-between; background: #000; padding: 10px; border-radius: 10px; margin-bottom: 10px; border-right: 4px solid var(--orange); }
        .edit-row img { width: 45px; height: 45px; border-radius: 5px; object-fit: cover; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; overflow-y: auto; padding: 20px; }
        .modal-content { background: #111; padding: 25px; border-radius: 20px; max-width: 850px; margin: 10px auto; border: 1px solid var(--orange); }
        
        #invoiceBox { background: white; color: black; padding: 40px; direction: ltr; font-family: 'Cairo', sans-serif; width: 210mm; margin: auto; }
        .inv-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .inv-table th, .inv-table td { padding: 10px; border: 1px solid #ddd; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 8px; font-family: 'Cairo'; }
        .btn-orange { background: var(--orange); color: white; }
        .btn-blue { background: var(--blue); color: white; }
    </style>
</head>
<body id="mainBody">

<div class="float-social">
    <a href="#" id="linkWA" class="wa-bg"><i class="fab fa-whatsapp"></i></a>
    <a href="#" id="linkFB" class="fb-bg"><i class="fab fa-facebook-f"></i></a>
    <a href="#" id="linkIG" class="ig-bg"><i class="fab fa-instagram"></i></a>
</div>

<header id="mainHeader"><h1 id="shopName" style="margin:0; color:var(--orange);">Digital Space Electronics</h1></header>

<div id="storeGrid" class="grid"></div>

<div id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>لوحة التحكم</h2>
        <button onclick="document.getElementById('adminPanel').style.display='none'" style="background:red; color:white; border:none; padding:10px; border-radius:8px;">إغلاق</button>
    </div>

    <div class="admin-box">
        <h3>🎨 المظهر والروابط</h3>
        <input type="text" id="setT" class="inp" placeholder="اسم المحل">
        <label>رفع الغلاف:</label><input type="file" class="inp" onchange="encodeCover('header')">
        <label>رفع الخلفية:</label><input type="file" class="inp" onchange="encodeCover('body')">
        <input type="text" id="setW" class="inp" placeholder="رقم الواتساب">
        <input type="text" id="setF" class="inp" placeholder="فيسبوك">
        <input type="text" id="setI" class="inp" placeholder="انستجرام">
        <button class="btn btn-blue" onclick="saveSettings()">حفظ الإعدادات</button>
    </div>

    <div class="admin-box">
        <h3 id="formT">📦 إضافة/تعديل منتج</h3>
        <input type="hidden" id="editKey">
        <input type="text" id="pN" class="inp" placeholder="الاسم">
        <input type="text" id="pC" class="inp" placeholder="الكود (PN)">
        <input type="number" id="pOld" class="inp" placeholder="السعر قبل الخصم">
        <input type="number" id="pNew" class="inp" placeholder="السعر الحالي">
        <textarea id="pD" class="inp" placeholder="الوصف"></textarea>
        <input type="file" id="pImg" class="inp" onchange="encodeImg()">
        <button class="btn btn-orange" onclick="handleP()">حفظ المنتج</button>
    </div>

    <div class="admin-box"><h3>🚨 الطلبات</h3><div id="listOrders"></div></div>
    <div class="admin-box"><h3>✅ الأرشيف</h3><div id="listArchive"></div></div>
    <div class="admin-box"><h3>📦 المخزن</h3><div id="listProds"></div></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div id="formSection">
            <h3 id="targetN" style="color:var(--orange); text-align:center;"></h3>
            <input type="text" id="cuN" class="inp" placeholder="اسم العميل">
            <input type="text" id="cuP" class="inp" placeholder="رقم الهاتف">
            <input type="number" id="cuQ" class="inp" value="1" placeholder="الكمية">
            <button class="btn btn-orange" onclick="submitOrder()">تأكيد الطلب</button>
        </div>

        <div id="invoiceSection" style="display:none;">
            <div id="adminTaxTool" style="display:none; background:#222; padding:10px; border-radius:10px; margin-bottom:10px;">
                <label><input type="checkbox" id="applyTax" onchange="updateGrandTotal()"> إضافة 5% VAT</label>
            </div>
            <div id="invoiceBox">
                <div style="display:flex; justify-content:space-between; border-bottom:2px solid #000;">
                    <div><b>INVOICE</b><br><small>Digital Space Electronics</small></div>
                    <div style="text-align:right">#<span id="v_serial"></span><br><small id="v_date"></small></div>
                </div>
                <div style="margin:15px 0;"><b>Customer:</b> <span id="v_name"></span></div>
                <table class="inv-table">
                    <thead><tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead>
                    <tbody><tr><td><span id="v_item"></span><br><small id="v_code"></small></td><td id="v_qty"></td><td id="v_unit"></td><td id="v_row_total"></td></tr></tbody>
                </table>
                <div style="text-align:right; margin-top:15px;">
                    <div id="taxLine" style="display:none;">VAT 5%: <span id="v_tax_val"></span></div>
                    <div style="font-size:1.2rem; font-weight:bold;">TOTAL: <span id="v_grand"></span> AED</div>
                </div>
            </div>
            <button class="btn btn-blue" onclick="downloadInv()">حفظ صورة</button>
            <button class="btn" id="waFinalBtn" style="background:var(--wa); color:white;" onclick="sendWA()">واتساب</button>
        </div>
        <button class="btn" style="background:none;" onclick="closeModal()">إغلاق</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDdqJApEM9mym9JdvwOS_Kl0mOwAt4o1qs", authDomain: "digital-space-electronics.firebaseapp.com", projectId: "digital-space-electronics", databaseURL: "https://digital-space-electronics-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();
    let tempImg="", tempHeader="", tempBody="", activeP=null, currentOrder=null, sets={};

    db.ref('settings').on('value', s => { 
        sets = s.val() || { title: "Digital Space Electronics", wa: "971504509223", lastSerial: 1000 };
        document.getElementById('shopName').innerText = sets.title;
        document.getElementById('linkWA').href = "https://wa.me/" + sets.wa;
        if(sets.hB) document.getElementById('mainHeader').style.backgroundImage = `url('${sets.hB}')`;
        if(sets.bB) document.getElementById('mainBody').style.backgroundImage = `url('${sets.bB}')`;
        document.getElementById('setT').value = sets.title; document.getElementById('setW').value = sets.wa;
    });

    function encodeCover(t) { const f = event.target.files[0]; const r = new FileReader(); r.onloadend = () => { if(t==='header') tempHeader=r.result; else tempBody=r.result; }; r.readAsDataURL(f); }
    function encodeImg() { const f = event.target.files[0]; const r = new FileReader(); r.onloadend = () => tempImg=r.result; r.readAsDataURL(f); }

    function saveSettings() {
        let u = { title: document.getElementById('setT').value, wa: document.getElementById('setW').value, fb: document.getElementById('setF').value, ig: document.getElementById('setI').value };
        if(tempHeader) u.hB = tempHeader; if(tempBody) u.bB = tempBody;
        db.ref('settings').update(u).then(() => alert("تم الحفظ"));
    }

    function handleP() {
        const k = document.getElementById('editKey').value;
        const d = { name: document.getElementById('pN').value, code: document.getElementById('pC').value, old: document.getElementById('pOld').value, price: document.getElementById('pNew').value, desc: document.getElementById('pD').value };
        if(tempImg) d.img = tempImg;
        if(k) db.ref('items/'+k).update(d); else db.ref('items').push(d);
        alert("تم!"); location.reload();
    }

    db.ref('items').on('value', s => {
        const grid = document.getElementById('storeGrid'); const list = document.getElementById('listProds');
        grid.innerHTML = ''; list.innerHTML = ''; const data = s.val();
        if(data) Object.keys(data).forEach(k => {
            const i = data[k]; const disc = i.old ? Math.round(((i.old - i.price) / i.old) * 100) : 0;
            grid.innerHTML += `<div class="card">${disc?`<div class="discount-tag">${disc}% OFF</div>`:''}<img src="${i.img}" class="card-img"><div style="padding:10px;"><h4>${i.name}</h4><b>${i.price} AED</b></div><button class="btn btn-blue" onclick="openOrder('${k}')">اطلب</button></div>`;
            list.innerHTML += `<div class="edit-row"><img src="${i.img}"><span>${i.name}</span><div><button onclick="editP('${k}')">تعديل</button><button onclick="db.ref('items/${k}').remove()">حذف</button></div></div>`;
        });
    });

    function editP(k) { db.ref('items/'+k).once('value', s => { const i = s.val(); document.getElementById('editKey').value = k; document.getElementById('pN').value = i.name; document.getElementById('pNew').value = i.price; document.getElementById('formT').innerText = "تعديل: " + i.name; window.scrollTo(0,0); }); }

    function openOrder(k) { db.ref('items/'+k).once('value', s => { activeP = s.val(); document.getElementById('targetN').innerText = activeP.name; document.getElementById('modal').style.display = 'block'; document.getElementById('formSection').style.display = 'block'; document.getElementById('invoiceSection').style.display = 'none'; }); }

    function submitOrder() {
        const q = document.getElementById('cuQ').value || 1; const nS = (sets.lastSerial || 1000) + 1;
        const o = { name: activeP.name, code: activeP.code, price: activeP.price, customer: document.getElementById('cuN').value, phone: document.getElementById('cuP').value, qty: q, serial: nS, date: new Date().toLocaleString(), status: 'new' };
        db.ref('orders').push(o); db.ref('settings').update({ lastSerial: nS });
        document.getElementById('adminTaxTool').style.display = "none"; renderInvoice(o, false);
    }

    function renderInvoice(o, isAdmin) {
        currentOrder = o; document.getElementById('v_serial').innerText = o.serial; document.getElementById('v_name').innerText = o.customer; document.getElementById('v_date').innerText = o.date;
        document.getElementById('v_item').innerText = o.name; document.getElementById('v_qty').innerText = o.qty; document.getElementById('v_unit').innerText = o.price;
        document.getElementById('v_row_total').innerText = (o.qty * o.price); updateGrandTotal();
        document.getElementById('formSection').style.display = 'none'; document.getElementById('invoiceSection').style.display = 'block';
    }

    function updateGrandTotal() {
        const sub = currentOrder.qty * currentOrder.price; const tax = document.getElementById('applyTax').checked;
        if(tax) { const tV = sub * 0.05; document.getElementById('taxLine').style.display="block"; document.getElementById('v_tax_val').innerText=tV.toFixed(2); document.getElementById('v_grand').innerText=(sub+tV).toFixed(2); }
        else { document.getElementById('taxLine').style.display="none"; document.getElementById('v_grand').innerText=sub; }
    }

    db.ref('orders').on('value', s => {
        const l = document.getElementById('listOrders'); const a = document.getElementById('listArchive'); l.innerHTML = ''; a.innerHTML = ''; const d = s.val();
        if(d) Object.keys(d).forEach(k => { const o = d[k]; const h = `<div class="edit-row"><span>#${o.serial}</span><div><button onclick="viewAdminInv('${k}')">عرض</button><button onclick="db.ref('orders/${k}').update({status:'archived'})">أرشفة</button></div></div>`; if(o.status === 'new') l.innerHTML += h; else a.innerHTML += h; });
    });

    function viewAdminInv(k) { db.ref('orders/'+k).once('value', s => { document.getElementById('adminTaxTool').style.display="block"; document.getElementById('waFinalBtn').style.display="none"; renderInvoice(s.val(), true); document.getElementById('modal').style.display='block'; }); }
    function downloadInv() { html2canvas(document.querySelector("#invoiceBox")).then(c => { const l = document.createElement('a'); l.download=`Inv.png`; l.href=c.toDataURL(); l.click(); }); }
    function sendWA() { window.open(`https://wa.me/${sets.wa}?text=طلب جديد: ${currentOrder.name}`, '_blank'); }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function checkAdmin() { if(prompt("Pass:")==="123") document.getElementById('adminPanel').style.display='block'; }
</script>

<footer style="text-align:center; padding:20px; opacity:0.1;"><button onclick="checkAdmin()">[ ADMIN ]</button></footer>
</body>
</html>
